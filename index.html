<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Garage</title>

<style>
body {
    margin:0;
    font-family: Arial;
}

header {
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

nav {
    background:#333;
    padding:10px;
    text-align:center;
}

nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}

.hero {
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center;
    background-size:cover;
    height:400px;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

.section {
    padding:40px;
    text-align:center;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    width:250px;
    margin:15px;
    padding:20px;
    box-shadow:0 0 10px #ccc;
}

footer {
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>

<body>

<header>
    <h1>Krishna Car Garage</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Buy Cars</a>
    <a href="#">Sell Cars</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Premium Car Services
</div>

<div class="section">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">
            <h3>Car Repair</h3>
            <p>Engine, oil change, full service</p>
        </div>

        <div class="card">
            <h3>Buy Cars</h3>
            <p>Premium used & new cars</p>
        </div>

        <div class="card">
            <h3>Sell Cars</h3>
            <p>Sell your car at best price</p>
        </div>

        <div class="card">
            <h3>Car Parts</h3>
            <p>All genuine spare parts</p>
        </div>
    </div>
</div>

<footer>
    © 2026 Krishna Car Garage
</footer>

</body>
</html>
